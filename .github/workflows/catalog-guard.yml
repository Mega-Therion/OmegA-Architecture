name: catalog-guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate catalog registry
        run: python3 scripts/catalog_guard.py
