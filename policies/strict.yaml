policy_id: policy_strict_v1
name: Strict Policy
version: "1.0"
environment: production

risk_threshold: 0.5
evidence_threshold: 0.5
verifier_threshold: 0.6
auto_approve_below: 0.1
human_required_above: 0.4
max_tokens: 512

capability_allowlist:
  - cap.memory.read
  - cap.docstore.retrieve
  - cap.llm.generate

capability_denylist:
  - cap.system.shell
  - cap.network.external
  - cap.memory.write
  - cap.docstore.ingest

action_escalation:
  delete: 0.0
  auth: 0.0
  execute: 0.0
  network: 0.0
  write: 0.3
  read: 0.8

blocked_patterns:
  - delete all
  - drop table
  - rm -rf
  - format disk
  - ignore your instructions
  - ignore your system prompt
  - sudo rm
  - truncate
  - destroy
  - execute
  - shell
  - sudo
