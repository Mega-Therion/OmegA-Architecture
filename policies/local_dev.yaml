policy_id: policy_localdev_v1
name: Local Development Policy
version: "1.0"
environment: development

risk_threshold: 0.95
evidence_threshold: 0.1
verifier_threshold: 0.2
auto_approve_below: 0.7
human_required_above: 0.9
max_tokens: 2048

capability_allowlist:
  - cap.memory.read
  - cap.memory.write
  - cap.docstore.retrieve
  - cap.docstore.ingest
  - cap.llm.generate
  - cap.system.shell

capability_denylist:
  - cap.network.external

action_escalation:
  delete: 0.3
  auth: 0.3
  execute: 0.7
  network: 0.8
  write: 0.9
  read: 1.0

blocked_patterns:
  - drop table
  - rm -rf
  - format disk
  - ignore your instructions
  - ignore your system prompt
